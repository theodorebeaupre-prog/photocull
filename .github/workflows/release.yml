name: Release

# Builds, signs (Developer ID), notarizes, staples, and publishes PhotoCull
# when a version tag is pushed.
#
# Signing is OPTIONAL: when the secrets below are not configured (e.g. forks,
# or before an Apple Developer membership exists), the workflow still publishes
# an ad-hoc-signed build, with a Gatekeeper note in the release.
#
# Repository secrets for signed releases:
#   BUILD_CERTIFICATE_BASE64   Developer ID Application certificate (.p12, base64)
#   P12_PASSWORD               password of that .p12
#   KEYCHAIN_PASSWORD          any random string (protects the temp CI keychain)
#   APPLE_ID                   Apple ID used for notarization
#   APPLE_TEAM_ID              10-character team identifier
#   APP_SPECIFIC_PASSWORD      app-specific password for notarytool
#   CODE_SIGN_IDENTITY_NAME    e.g. "Developer ID Application: Jane Doe (TEAMID1234)"

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build, sign if possible & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: swift test --package-path Core

      - name: Check signing availability
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No signing certificate configured — publishing an unsigned build."
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build signed Release
        if: steps.signing.outputs.enabled == 'true'
        env:
          CODE_SIGN_IDENTITY_NAME: ${{ secrets.CODE_SIGN_IDENTITY_NAME }}
        run: |
          xcodebuild -project PhotoCull.xcodeproj \
            -scheme PhotoCull \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY_NAME" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            build

      - name: Build unsigned Release
        if: steps.signing.outputs.enabled == 'false'
        run: |
          xcodebuild -project PhotoCull.xcodeproj \
            -scheme PhotoCull \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY=- \
            build

      - name: Notarize and staple
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          APP="build/Build/Products/Release/PhotoCull.app"
          ditto -c -k --keepParent "$APP" notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP"

      - name: Zip app
        run: |
          ditto -c -k --keepParent \
            "build/Build/Products/Release/PhotoCull.app" \
            "PhotoCull-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ steps.signing.outputs.enabled }}
        run: |
          NOTES=""
          if [ "$SIGNED" = "false" ]; then
            NOTES="> [!NOTE]
          > This build is not code-signed or notarized. On first launch, right-click **PhotoCull.app** and choose **Open**, or allow it under *System Settings → Privacy & Security*."
          fi
          gh release create "$GITHUB_REF_NAME" \
            "PhotoCull-${GITHUB_REF_NAME}.zip" \
            --title "PhotoCull $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "$NOTES"
