name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Core tests
        run: swift test --package-path Core

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build app
        run: |
          xcodegen generate
          xcodebuild -project PhotoCull.xcodeproj -scheme PhotoCull \
            -configuration Release CODE_SIGN_IDENTITY=- build
